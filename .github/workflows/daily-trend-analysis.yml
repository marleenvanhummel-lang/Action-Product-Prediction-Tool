name: Daily Trend Analysis

on:
  schedule:
    # Run every day at 08:30 UTC (= 09:30 CET / 10:30 CEST)
    - cron: '30 8 * * *'
  # Also allow manual trigger via GitHub UI
  workflow_dispatch:

jobs:
  run-trend-analysis:
    runs-on: ubuntu-latest
    name: Trigger trend prediction analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt
          playwright install chromium

      - name: Scrape Pinterest Trends
        run: |
          # Check if URL is localhost (development) - skip if so
          if [[ "${{ secrets.TREND_ANALYSIS_URL }}" == *"localhost"* ]]; then
            echo "⚠️ Skipping Pinterest scraping - localhost URL detected"
          else
            echo "📌 Scraping Pinterest trends..."
            
            # Run Pinterest scraper and upload to API
            python tools/scrape_pinterest_trends.py '{"region": "NL"}' | \
            curl -s -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.TREND_ANALYSIS_SECRET }}" \
              -H "x-api-key: ${{ secrets.PINTEREST_UPLOAD_KEY }}" \
              "${{ secrets.TREND_ANALYSIS_URL }}/api/trends/pinterest" \
              -d @-
            
            echo "✅ Pinterest trends scraped and uploaded"
          fi

      - name: Trigger Trend Analysis
        run: |
          # Check if URL is localhost (development) - skip if so
          if [[ "${{ secrets.TREND_ANALYSIS_URL }}" == *"localhost"* ]]; then
            echo "⚠️ Skipping analysis - localhost URL detected. Deploy your app first."
            echo "Set TREND_ANALYSIS_URL to your production URL in repository secrets."
            exit 0
          fi
          
          echo "🌐 Triggering trend analysis at ${{ secrets.TREND_ANALYSIS_URL }}"
          
          # Make the API call with timeout and error handling
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.TREND_ANALYSIS_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 600 \
            "${{ secrets.TREND_ANALYSIS_URL }}/api/trends/schedule-run")
          
          # Extract status code
          http_status=$(echo "$response" | grep "HTTP_STATUS:" | cut -d: -f2)
          response_body=$(echo "$response" | sed '/HTTP_STATUS:/d')
          
          echo "📡 Response status: $http_status"
          
          if [[ "$http_status" == "200" ]]; then
            echo "✅ Analysis triggered successfully"
            echo "Response: $response_body"
          else
            echo "❌ Analysis failed with status $http_status"
            echo "Response: $response_body"
            exit 1
          fi

      - name: Log result
        if: success()
        run: echo "✅ Daily analysis completed successfully at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Log failure
        if: failure()
        run: echo "❌ Daily analysis failed - check server logs and secrets configuration"
