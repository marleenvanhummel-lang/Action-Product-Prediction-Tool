name: Culture Radar daily refresh

# Independent fallback for the Vercel cron, which stopped firing on
# 2026-05-14 (Git-integration deploys disabled). Runs the same daily
# refresh as /api/culture/cron-refresh, but split into discrete phases
# so no single Vercel function call hits the 5-minute timeout.
#
# Each step below targets its own endpoint, giving each phase a fresh
# 300s function budget. Earlier we hit FUNCTION_INVOCATION_TIMEOUT
# trying to do scrape + extract + briefs + enrichment in one call.
#
# Rotate the bearer:
#   gh secret set CULTURE_API_SECRET --body "<new>"
# Trigger manually:
#   gh workflow run cron-refresh.yml

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 08:00 NL summer / 07:00 NL winter
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "manual"

permissions:
  contents: read

env:
  BASE_URL: "https://action-culture-radar.vercel.app"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Verify secret is configured
        run: |
          if [ -z "${{ secrets.CULTURE_API_SECRET }}" ]; then
            echo "::error::CULTURE_API_SECRET is not set. Run: gh secret set CULTURE_API_SECRET --body '<API_SECRET>'"
            exit 1
          fi

      # ── Phase 1: scrape all active sources ────────────────────────────────
      - name: Scrape sources
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
          REASON: ${{ inputs.reason || 'scheduled' }}
        run: |
          set -euo pipefail
          echo "Scraping at $(date -u +%H:%M:%SZ)"
          curl -sS -o /tmp/p.json -w 'HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 320 \
            -d "{\"triggeredBy\":\"gha-${REASON}\"}" \
            "$BASE_URL/api/culture/scrape"
          jq '{okCount, failedCount, durationMs, jobId}' /tmp/p.json || head -c 500 /tmp/p.json
          if jq -e '.ok != true' /tmp/p.json >/dev/null 2>&1; then
            echo "::error::Scrape phase reported ok=false"
            exit 1
          fi

      # ── Phase 2: drain extract queue (Gemini-heavy, may need 2 passes) ────
      - name: Extract — pass 1
        if: success()
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
        run: |
          set -euo pipefail
          echo "Extract pass 1 at $(date -u +%H:%M:%SZ)"
          curl -sS -o /tmp/p.json -w 'HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 320 \
            -d '{"limit":200,"rerank":true}' \
            "$BASE_URL/api/culture/extract"
          jq '{processed, inserted, updated, queueRemaining}' /tmp/p.json || head -c 500 /tmp/p.json

      - name: Extract — pass 2 (drain backlog)
        if: success()
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
        run: |
          set -euo pipefail
          echo "Extract pass 2 at $(date -u +%H:%M:%SZ)"
          curl -sS -o /tmp/p.json -w 'HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 320 \
            -d '{"limit":200,"rerank":true}' \
            "$BASE_URL/api/culture/extract"
          jq '{processed, inserted, updated, queueRemaining}' /tmp/p.json || head -c 500 /tmp/p.json

      # ── Phase 3: verify (fabricated/generic check), growth scores ─────────
      - name: Verify trends + compute growth
        if: success()
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
        run: |
          set -euo pipefail
          echo "Verify+growth at $(date -u +%H:%M:%SZ)"
          curl -sS -o /tmp/v.json -w 'verify HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 320 -d '{"limit":120}' "$BASE_URL/api/culture/verify-trends"
          jq '.verdicts' /tmp/v.json || head -c 300 /tmp/v.json
          curl -sS -o /tmp/g.json -w 'growth HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 180 -d '{}' "$BASE_URL/api/culture/compute-growth"

      # ── Phase 4: enrichment (country / vibe / subculture / bundles) ───────
      - name: Enrich countries
        if: success()
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
        run: |
          curl -sS -o /tmp/p.json -w 'countries HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 320 -d '{"limit":120}' "$BASE_URL/api/culture/enrich-countries"
          jq '.tagged,.dropped' /tmp/p.json || head -c 300 /tmp/p.json

      - name: Enrich vibes
        if: success()
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
        run: |
          curl -sS -o /tmp/p.json -w 'vibes HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 320 -d '{"limit":120}' "$BASE_URL/api/culture/enrich-vibes"
          jq '.tagged' /tmp/p.json || head -c 300 /tmp/p.json

      - name: Enrich subcultures
        if: success()
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
        run: |
          curl -sS -o /tmp/p.json -w 'subs HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 320 -d '{"limit":120}' "$BASE_URL/api/culture/enrich-subcultures"

      - name: Recompute bundles
        if: success()
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
        run: |
          curl -sS -o /tmp/p.json -w 'bundles HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 180 -d '{}' "$BASE_URL/api/culture/recompute-bundles"

      # ── Phase 5: briefs (Gemini-heavy, in batches of 20) ──────────────────
      - name: Generate Action briefs
        if: success()
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
        run: |
          set -euo pipefail
          echo "Briefs at $(date -u +%H:%M:%SZ)"
          # Three batches per run gets the top ~60 newly-extracted trends.
          # Tail trends fall behind a few days but that's fine — the
          # magazine only surfaces the top anyway.
          for i in 1 2 3; do
            echo "  batch $i"
            curl -sS -o /tmp/b.json -w '  HTTP %{http_code} (%{time_total}s)\n' \
              -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
              --max-time 240 -d '{"limit":20}' "$BASE_URL/api/culture/backfill-briefs"
            jq -c '{briefed, failed, processed}' /tmp/b.json || head -c 200 /tmp/b.json
          done

      # ── Phase 6: snapshots + lifecycle (cheap SQL writes) ─────────────────
      - name: Snapshots + lifecycle
        if: success()
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
        run: |
          curl -sS -o /tmp/s.json -w 'snap-trends HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 180 -d '{}' "$BASE_URL/api/culture/snapshot-trends"
          curl -sS -o /tmp/s.json -w 'snap-gt HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 180 -d '{}' "$BASE_URL/api/culture/snapshot-gt"
          curl -sS -o /tmp/s.json -w 'lifecycle HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 180 -d '{}' "$BASE_URL/api/culture/compute-lifecycle"

      # ── Phase 7: embeddings + mindmaps + URL verify ────────────────────────
      - name: Embed + mindmaps + URL verify
        if: success()
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
        run: |
          curl -sS -o /tmp/e.json -w 'embed HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 180 -d '{"limit":120}' "$BASE_URL/api/culture/embed"
          curl -sS -o /tmp/m.json -w 'mindmaps HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 320 -d '{"limit":60}' "$BASE_URL/api/culture/enrich-mindmaps"
          curl -sS -o /tmp/u.json -w 'urls HTTP %{http_code} (%{time_total}s)\n' \
            -X POST -H "Authorization: Bearer $BEARER" -H 'Content-Type: application/json' \
            --max-time 320 -d '{"limit":40}' "$BASE_URL/api/culture/verify-urls"

      # ── Phase 8: article-date verification (defends against stale roundups)
      - name: Article-date verification
        if: success()
        env:
          BEARER: ${{ secrets.CULTURE_API_SECRET }}
        run: |
          curl -sS -o /tmp/a.json -w 'article-dates HTTP %{http_code} (%{time_total}s)\n' \
            -X GET -H "Authorization: Bearer $BEARER" \
            --max-time 320 \
            "$BASE_URL/api/culture/verify-article-dates?dryRun=0&limit=200&maxAgeDays=30&concurrency=8"
          jq '{scanned, archived, fresh, stale, inconclusive}' /tmp/a.json || head -c 300 /tmp/a.json

      - name: Pipeline summary
        if: always()
        run: |
          echo "Daily refresh finished at $(date -u +%H:%M:%SZ)"
          echo "Check /api/culture/scrape/status?latest=1 and /api/culture/source-productivity for follow-up health."
